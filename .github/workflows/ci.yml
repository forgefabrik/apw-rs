name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.82"

jobs:

  build:
    name: build / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ env.MSRV }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace

  meta-tools:
    name: feature registry meta-tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ env.MSRV }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-meta-${{ hashFiles('**/Cargo.lock') }}
      - name: Build meta-tools
        run: cargo build -p feature-schema -p feature-guardian -p feature-md -p feature-harvester -p feature-graph
      - name: feature-guardian check
        run: cargo run -p feature-guardian -- check --strict
      - name: feature-md render --check
        run: cargo run -p feature-md -- render --check
      - name: feature-graph cycles
        run: cargo run -p feature-graph -- cycles

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ env.MSRV }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Deny check
        run: cargo deny check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ env.MSRV }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Audit
        run: cargo audit

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ env.MSRV }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
