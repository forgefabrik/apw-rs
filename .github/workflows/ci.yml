name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  meta-tools:
    name: feature registry meta-tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (MSRV 1.82)
        uses: dtolnay/rust-toolchain@1.82.0
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-meta-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace --all-targets
      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace
      - name: feature-guardian check (strict)
        run: cargo run -p feature-guardian -- check --strict
      - name: feature-md render --check
        run: cargo run -p feature-md -- render --check
      - name: feature-graph cycles
        run: cargo run -p feature-graph -- cycles
