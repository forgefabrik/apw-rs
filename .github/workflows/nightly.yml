name: nightly-hardening
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rust-lang/cargo-binstall@main
        with:
          package: cargo-cyclonedx
      - run: cargo cyclonedx --format json -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30
  miri:
    name: Miri Sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri
      - run: cargo miri test --workspace
  deny-audit:
    name: Deny + Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
