[graph]
targets = [
    { triples = ["x86_64-unknown-linux-gnu"] },
]

[advisories]
ignore = []
severity-threshold = "low"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "0BSD",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []

[sources]
allow-git = []
unknown-registry = "deny"
unknown-git = "deny"

